name: CI

on:
  push:
    branches: [master, "port/**", "mc/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean build
